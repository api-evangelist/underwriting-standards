aid: underwriting-standards
name: Underwriting Standards
kind: topic
description: >-
  A curated collection of data standards, APIs, and specifications used in
  insurance underwriting. This covers the landscape of industry-wide data
  interchange formats, protocol standards, and API ecosystems that enable
  carriers, MGAs, brokers, and InsurTech platforms to exchange underwriting
  data programmatically. Key standards include ACORD (Property & Casualty,
  Life, Reinsurance), LIMRA LDEx (employee benefits), and emerging OpenInsurance
  initiatives.
